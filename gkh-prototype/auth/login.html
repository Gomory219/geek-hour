<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - GeekHour</title>
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/search.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="header-inner">
                <a href="../index.html" class="logo">
                    <span class="logo-icon">&lt;/&gt;</span>
                    <span class="logo-text">GeekHour</span>
                </a>

                <nav class="nav">
                    <a href="../index.html" class="nav-item">首页</a>
                    <a href="../course/index.html" class="nav-item">课程</a>
                    <a href="../community/index.html" class="nav-item">社区</a>
                </nav>

                <div class="search-box">
                    <input type="text" class="search-input" placeholder="搜索..." id="searchInput">
                    <button class="search-btn" onclick="handleSearch()">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.35-4.35"></path>
                        </svg>
                    </button>
                </div>

                <div class="user-actions">
                    <a href="./login.html" class="btn btn-ghost btn-sm">登录</a>
                    <a href="./register.html" class="btn btn-primary btn-sm">注册</a>
                </div>
            </div>
        </div>
    </header>

    <main class="main">
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-header">
                    <div class="auth-logo">
                        <span>&lt;/&gt;</span>
                        <span>GeekHour</span>
                    </div>
                    <h1 class="auth-title">欢迎回来</h1>
                    <p class="auth-subtitle">登录您的账户继续学习</p>
                </div>

                <form class="auth-form">
                    <div class="form-group">
                        <label class="form-label" for="username">用户名/邮箱</label>
                        <input type="text" id="username" class="input" placeholder="请输入用户名或邮箱">
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="password">密码</label>
                        <input type="password" id="password" class="input" placeholder="请输入密码">
                    </div>

                    <div class="auth-options">
                        <label>
                            <input type="checkbox">
                            <span>记住我</span>
                        </label>
                        <a href="#" class="link">忘记密码?</a>
                    </div>

                    <div class="auth-actions">
                        <button type="submit" class="btn btn-primary btn-lg" onclick="event.preventDefault(); window.location.href='../user/profile.html'">登录</button>
                    </div>
                </form>

                <div class="auth-divider">
                    <span>或使用第三方账号登录</span>
                </div>

                <div class="auth-social">
                    <button class="auth-social-btn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                        </svg>
                        GitHub
                    </button>
                    <button class="auth-social-btn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                        </svg>
                        Google
                    </button>
                </div>

                <div class="auth-footer">
                    还没有账户? <a href="./register.html">立即注册</a>
                </div>
            </div>
        </div>
    </main>

    <script src="../js/main.js"></script>
</body>
</html>
