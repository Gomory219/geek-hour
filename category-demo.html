<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>课程分类查询</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, "Microsoft YaHei", sans-serif; background: #f5f5f5; padding: 40px 20px; }
        .container { max-width: 960px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 30px; color: #333; font-size: 28px; }

        /* 搜索栏 */
        .search-bar { display: flex; justify-content: center; margin-bottom: 30px; gap: 10px; }
        .search-bar input {
            width: 360px; padding: 12px 18px; font-size: 16px;
            border: 2px solid #ddd; border-radius: 8px; outline: none; transition: border-color .2s;
        }
        .search-bar input:focus { border-color: #409eff; }
        .search-bar button {
            padding: 12px 24px; font-size: 16px; color: #fff; background: #409eff;
            border: none; border-radius: 8px; cursor: pointer; transition: background .2s; white-space: nowrap;
        }
        .search-bar button:hover { background: #3a8ee6; }
        .search-bar .btn-category {
            background: #fff; color: #409eff; border: 2px solid #409eff;
            display: flex; align-items: center; gap: 4px;
        }
        .search-bar .btn-category:hover { background: #ecf5ff; }
        .search-bar .btn-category .arrow { font-size: 10px; transition: transform .2s; }
        .search-bar .btn-category .arrow.open { transform: rotate(180deg); }

        /* 已选分类标签 */
        .selected-tag {
            text-align: center; margin-bottom: 20px; min-height: 32px;
        }
        .selected-tag span {
            display: inline-block; padding: 6px 16px; background: #ecf5ff; color: #409eff;
            border-radius: 16px; font-size: 14px;
        }
        .selected-tag .clear {
            cursor: pointer; margin-left: 6px; color: #409eff; font-weight: bold;
        }
        .selected-tag .clear:hover { color: #f56c6c; }

        /* 弹窗遮罩 */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,.4); z-index: 100; justify-content: center; align-items: center;
        }
        .modal-overlay.show { display: flex; }

        /* 弹窗 */
        .modal {
            background: #fff; border-radius: 12px; width: 480px; max-width: 90vw;
            box-shadow: 0 12px 40px rgba(0,0,0,.15); overflow: hidden;
        }
        .modal-header {
            padding: 18px 24px; border-bottom: 1px solid #eee;
            display: flex; justify-content: space-between; align-items: center;
        }
        .modal-header h3 { font-size: 17px; color: #333; }
        .modal-header .close {
            font-size: 22px; color: #999; cursor: pointer; line-height: 1;
            width: 28px; height: 28px; display: flex; align-items: center; justify-content: center;
            border-radius: 50%; transition: background .2s;
        }
        .modal-header .close:hover { background: #f5f5f5; color: #333; }

        /* 面包屑 */
        .breadcrumb {
            padding: 12px 24px 0; font-size: 13px; color: #999;
        }
        .breadcrumb span { cursor: pointer; transition: color .2s; }
        .breadcrumb span:hover { color: #409eff; }
        .breadcrumb .sep { margin: 0 6px; }
        .breadcrumb .current { color: #333; cursor: default; }

        /* 分类选项列表 */
        .modal-body { padding: 16px 24px; max-height: 360px; overflow-y: auto; }
        .cat-item {
            padding: 14px 16px; border-radius: 8px; cursor: pointer;
            display: flex; justify-content: space-between; align-items: center;
            transition: background .15s; font-size: 15px; color: #333;
        }
        .cat-item:hover { background: #f5f7fa; }
        .cat-item.selected { background: #ecf5ff; color: #409eff; }
        .cat-item .right-arrow { color: #ccc; font-size: 14px; }

        .modal-footer {
            padding: 16px 24px; border-top: 1px solid #eee;
            display: flex; justify-content: flex-end; gap: 10px;
        }
        .modal-footer button {
            padding: 10px 28px; border-radius: 8px; font-size: 15px;
            cursor: pointer; border: none; transition: background .2s;
        }
        .btn-cancel { background: #f5f5f5; color: #666; }
        .btn-cancel:hover { background: #e8e8e8; }
        .btn-confirm { background: #409eff; color: #fff; }
        .btn-confirm:hover { background: #3a8ee6; }

        /* 课程列表 */
        .course-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .course-card {
            background: #fff; border-radius: 10px; overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,.08); transition: transform .2s, box-shadow .2s; cursor: pointer;
        }
        .course-card:hover { transform: translateY(-4px); box-shadow: 0 6px 20px rgba(0,0,0,.12); }
        .course-card .cover { height: 160px; display: flex; align-items: center; justify-content: center; font-size: 48px; }
        .course-card .info { padding: 16px; }
        .course-card .info h3 { font-size: 16px; color: #333; margin-bottom: 8px; }
        .course-card .info p {
            font-size: 13px; color: #999; margin-bottom: 10px; line-height: 1.5;
            overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
        }
        .course-card .meta { display: flex; justify-content: space-between; align-items: center; }
        .course-card .meta .tag { font-size: 12px; padding: 2px 8px; border-radius: 4px; background: #ecf5ff; color: #409eff; }
        .course-card .meta .price { font-size: 18px; color: #f56c6c; font-weight: bold; }
        .course-card .meta .price.free { color: #67c23a; font-size: 14px; }
        .no-result { text-align: center; color: #999; padding: 60px 0; font-size: 16px; }
    </style>
</head>
<body>
<div class="container">
    <h1>课程分类查询</h1>

    <!-- 搜索栏 -->
    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="搜索课程名称..." onkeyup="if(event.key==='Enter')doSearch()">
        <button class="btn-category" onclick="openModal()">
            <span id="catBtnText">选择分类</span>
            <span class="arrow" id="catArrow">▼</span>
        </button>
        <button onclick="doSearch()">搜索</button>
    </div>

    <!-- 已选分类 -->
    <div class="selected-tag" id="selectedTag"></div>

    <!-- 课程列表 -->
    <div class="course-list" id="courseList"></div>
</div>

<!-- 分类弹窗 -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
    <div class="modal">
        <div class="modal-header">
            <h3>选择分类</h3>
            <div class="close" onclick="closeModal()">&times;</div>
        </div>
        <div class="breadcrumb" id="breadcrumb"></div>
        <div class="modal-body" id="modalBody"></div>
        <div class="modal-footer">
            <button class="btn-cancel" onclick="closeModal()">取消</button>
            <button class="btn-confirm" onclick="confirmSelect()">确定</button>
        </div>
    </div>
</div>

<script>
// ============ 假数据 ============
const categories = [
    { id: 1, name: '前端开发', children: [
        { id: 101, name: 'HTML/CSS' }, { id: 102, name: 'JavaScript' },
        { id: 103, name: 'Vue.js' }, { id: 104, name: 'React' }, { id: 105, name: '前端工程化' }
    ]},
    { id: 2, name: '后端开发', children: [
        { id: 201, name: 'Java' }, { id: 202, name: 'Python' },
        { id: 203, name: 'Go' }, { id: 204, name: 'Node.js' }, { id: 205, name: 'Spring Boot' }
    ]},
    { id: 3, name: '移动开发', children: [
        { id: 301, name: 'Android' }, { id: 302, name: 'iOS' },
        { id: 303, name: 'Flutter' }, { id: 304, name: 'React Native' }
    ]},
    { id: 4, name: '数据库', children: [
        { id: 401, name: 'MySQL' }, { id: 402, name: 'Redis' },
        { id: 403, name: 'MongoDB' }, { id: 404, name: 'PostgreSQL' }
    ]},
    { id: 5, name: '云计算与运维', children: [
        { id: 501, name: 'Linux' }, { id: 502, name: 'Docker' },
        { id: 503, name: 'Kubernetes' }, { id: 504, name: 'CI/CD' }
    ]},
    { id: 6, name: '人工智能', children: [
        { id: 601, name: '机器学习' }, { id: 602, name: '深度学习' },
        { id: 603, name: '自然语言处理' }, { id: 604, name: '计算机视觉' }
    ]},
    { id: 7, name: '网络安全', children: [
        { id: 701, name: 'Web安全' }, { id: 702, name: '渗透测试' },
        { id: 703, name: '密码学' }, { id: 704, name: '安全运维' }
    ]},
    { id: 8, name: '数据科学与分析', children: [
        { id: 801, name: '数据分析' }, { id: 802, name: '数据可视化' },
        { id: 803, name: '大数据' }, { id: 804, name: '统计学' }
    ]}
];

const colors = ['#409eff','#67c23a','#e6a23c','#f56c6c','#909399','#9b59b6','#1abc9c','#e74c3c'];

const courses = [
    { id: 1, name: 'Vue3 从入门到实战', category: 103, subCategory: 'Vue.js', desc: '全面学习 Vue3 组合式 API、响应式原理与项目实战', level: '入门', price: 0, isFree: true },
    { id: 2, name: 'React18 深度解析', category: 104, subCategory: 'React', desc: '深入理解 React18 新特性、Hooks、并发模式', level: '进阶', price: 99, isFree: false },
    { id: 3, name: 'JavaScript 高级编程', category: 102, subCategory: 'JavaScript', desc: '闭包、原型链、异步编程等核心知识点精讲', level: '进阶', price: 68, isFree: false },
    { id: 4, name: 'CSS 动画与特效实战', category: 101, subCategory: 'HTML/CSS', desc: '学习 CSS3 动画、过渡、变换等高级特效技巧', level: '入门', price: 0, isFree: true },
    { id: 5, name: 'Webpack5 工程化实践', category: 105, subCategory: '前端工程化', desc: '模块打包、性能优化、微前端架构', level: '高级', price: 128, isFree: false },
    { id: 6, name: 'Java 并发编程详解', category: 201, subCategory: 'Java', desc: '线程池、锁机制、并发容器核心原理', level: '高级', price: 149, isFree: false },
    { id: 7, name: 'Spring Boot 3 实战', category: 205, subCategory: 'Spring Boot', desc: '基于 Spring Boot 3 构建企业级微服务应用', level: '进阶', price: 199, isFree: false },
    { id: 8, name: 'Python 数据处理', category: 202, subCategory: 'Python', desc: 'Pandas、NumPy 数据清洗与分析', level: '入门', price: 0, isFree: true },
    { id: 9, name: 'Go 语言微服务开发', category: 203, subCategory: 'Go', desc: '使用 Go 构建高性能微服务架构', level: '进阶', price: 119, isFree: false },
    { id: 10, name: 'Node.js 后端开发', category: 204, subCategory: 'Node.js', desc: 'Express/Koa 框架实战与 RESTful API 设计', level: '入门', price: 59, isFree: false },
    { id: 11, name: 'MySQL 性能优化', category: 401, subCategory: 'MySQL', desc: '索引优化、查询调优、分库分表实战', level: '高级', price: 168, isFree: false },
    { id: 12, name: 'Redis 核心技术与实战', category: 402, subCategory: 'Redis', desc: '数据结构、缓存策略、分布式锁深入解析', level: '进阶', price: 99, isFree: false },
    { id: 13, name: 'Docker 容器化部署', category: 502, subCategory: 'Docker', desc: 'Dockerfile 编写、镜像管理、容器编排', level: '入门', price: 0, isFree: true },
    { id: 14, name: 'Kubernetes 入门到精通', category: 503, subCategory: 'Kubernetes', desc: 'K8s 核心概念、Pod 管理、服务发现与负载均衡', level: '进阶', price: 179, isFree: false },
    { id: 15, name: '深度学习与 PyTorch', category: 602, subCategory: '深度学习', desc: '神经网络、CNN、RNN、Transformer 模型实战', level: '进阶', price: 199, isFree: false },
    { id: 16, name: 'Flutter 跨平台开发', category: 303, subCategory: 'Flutter', desc: 'Dart 语言基础与 Flutter UI 组件开发', level: '入门', price: 79, isFree: false },
    { id: 17, name: 'Web 安全攻防实战', category: 701, subCategory: 'Web安全', desc: 'XSS、CSRF、SQL注入防御与渗透测试', level: '进阶', price: 129, isFree: false },
    { id: 18, name: '大数据 Spark 实战', category: 803, subCategory: '大数据', desc: 'Spark 核心原理、RDD、Spark SQL 与实时计算', level: '高级', price: 219, isFree: false },
];

// ============ 状态 ============
// 导航路径栈，每项: { id, name, children } 或 { id, name } (叶子节点)
let navStack = [];
// 临时选中项（弹窗内）
let tempSelected = null;
// 确认后的筛选条件
let filterCategory = null; // { id, name, parentId?, parentName? }
let searchText = '';

// ============ 弹窗 ============
function openModal() {
    navStack = [];
    tempSelected = null;
    document.getElementById('modalOverlay').classList.add('show');
    document.getElementById('catArrow').classList.add('open');
    renderModal();
}

function closeModal() {
    document.getElementById('modalOverlay').classList.remove('show');
    document.getElementById('catArrow').classList.remove('open');
}

function renderModal() {
    // 面包屑
    const bc = document.getElementById('breadcrumb');
    let bchtml = '<span onclick="navBack(-1)">全部分类</span>';
    navStack.forEach((item, i) => {
        bchtml += '<span class="sep">/</span>';
        if (i === navStack.length - 1) {
            bchtml += `<span class="current">${item.name}</span>`;
        } else {
            bchtml += `<span onclick="navBack(${i})">${item.name}</span>`;
        }
    });
    bc.innerHTML = bchtml;

    // 当前层级列表
    const body = document.getElementById('modalBody');
    let items;
    if (navStack.length === 0) {
        items = categories.map(c => ({ ...c, hasChildren: true }));
    } else {
        const current = navStack[navStack.length - 1];
        items = (current.children || []).map(c => ({ ...c, hasChildren: false }));
    }

    body.innerHTML = items.map(item => {
        const sel = tempSelected && tempSelected.id === item.id && tempSelected.level === navStack.length ? 'selected' : '';
        const arrow = item.hasChildren ? '<span class="right-arrow">></span>' : '';
        return `<div class="cat-item ${sel}" onclick="onCatClick(${item.id}, ${item.hasChildren}, ${navStack.length})">${item.name}${arrow}</div>`;
    }).join('');
}

function onCatClick(id, hasChildren, level) {
    if (hasChildren) {
        // 进入下一级
        const cat = categories.find(c => c.id === id);
        navStack.push({ id: cat.id, name: cat.name, children: cat.children });
        tempSelected = { id: cat.id, name: cat.name, level: navStack.length - 1 };
        renderModal();
    } else {
        // 选中叶子节点
        const parent = navStack[navStack.length - 1];
        const child = parent.children.find(c => c.id === id);
        tempSelected = { id: child.id, name: child.name, level: navStack.length, parentId: parent.id, parentName: parent.name };
        renderModal();
    }
}

function navBack(index) {
    if (index === -1) {
        navStack = [];
    } else {
        navStack = navStack.slice(0, index + 1);
    }
    tempSelected = null;
    renderModal();
}

function confirmSelect() {
    if (tempSelected) {
        filterCategory = tempSelected;
        document.getElementById('catBtnText').textContent = tempSelected.name;
        // 显示已选标签
        let tagHtml = `<span>${tempSelected.name}`;
        if (tempSelected.parentName) {
            tagHtml = `<span>${tempSelected.parentName} / ${tempSelected.name}`;
        }
        tagHtml += ' <span class="clear" onclick="clearFilter()">&times;</span></span>';
        document.getElementById('selectedTag').innerHTML = tagHtml;
    }
    closeModal();
    renderCourses();
}

function clearFilter() {
    filterCategory = null;
    document.getElementById('catBtnText').textContent = '选择分类';
    document.getElementById('selectedTag').innerHTML = '';
    renderCourses();
}

// ============ 搜索 & 渲染 ============
function doSearch() {
    searchText = document.getElementById('searchInput').value.trim();
    renderCourses();
}

function renderCourses() {
    const el = document.getElementById('courseList');
    let filtered = courses;

    if (filterCategory) {
        if (filterCategory.parentId) {
            // 选了二级分类
            filtered = filtered.filter(c => c.category === filterCategory.id);
        } else {
            // 选了一级分类
            const cat = categories.find(c => c.id === filterCategory.id);
            const childIds = cat.children.map(c => c.id);
            filtered = filtered.filter(c => childIds.includes(c.category));
        }
    }

    if (searchText) {
        const kw = searchText.toLowerCase();
        filtered = filtered.filter(c => c.name.toLowerCase().includes(kw) || c.desc.toLowerCase().includes(kw));
    }

    if (filtered.length === 0) {
        el.innerHTML = '<div class="no-result">没有找到匹配的课程</div>';
        return;
    }

    el.innerHTML = filtered.map(course => `
        <div class="course-card">
            <div class="cover" style="background:${colors[(course.id - 1) % colors.length]}22; color:${colors[(course.id - 1) % colors.length]}">
                ${course.subCategory.charAt(0).toUpperCase()}
            </div>
            <div class="info">
                <h3>${course.name}</h3>
                <p>${course.desc}</p>
                <div class="meta">
                    <span class="tag">${course.level} · ${course.subCategory}</span>
                    ${course.isFree ? '<span class="price free">免费</span>' : `<span class="price">¥${course.price}</span>`}
                </div>
            </div>
        </div>
    `).join('');
}

// 初始化
renderCourses();
</script>
</body>
</html>
