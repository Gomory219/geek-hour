<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <style>
    .primary { fill: #2F80ED; stroke: #2F80ED; }
    .dark { fill: #0B1F33; }
  </style>

  <!-- 外框（眼镜形态） -->
  <rect x="25" y="50" width="150" height="100" rx="50" ry="50" class="dark"/>

  <!-- 内部时钟 -->
  <circle cx="100" cy="100" r="40" fill="#ffffff"/>

  <!-- 刻度 -->
  <line x1="100" y1="65" x2="100" y2="72" stroke="#2F80ED" stroke-width="2.5"/>
  <line x1="100" y1="128" x2="100" y2="135" stroke="#2F80ED" stroke-width="2.5"/>
  <line x1="65" y1="100" x2="72" y2="100" stroke="#2F80ED" stroke-width="2.5"/>
  <line x1="128" y1="100" x2="135" y2="100" stroke="#2F80ED" stroke-width="2.5"/>

  <!-- 对角刻度 -->
  <line x1="74" y1="74" x2="79" y2="79" stroke="#2F80ED" stroke-width="2" opacity="0.6"/>
  <line x1="121" y1="79" x2="126" y2="74" stroke="#2F80ED" stroke-width="2" opacity="0.6"/>
  <line x1="74" y1="126" x2="79" y2="121" stroke="#2F80ED" stroke-width="2" opacity="0.6"/>
  <line x1="121" y1="121" x2="126" y2="126" stroke="#2F80ED" stroke-width="2" opacity="0.6"/>

  <!-- 时钟指针 -->
  <line x1="100" y1="100" x2="100" y2="75" stroke="#2F80ED" stroke-width="4" stroke-linecap="round"/>
  <line x1="100" y1="100" x2="118" y2="112" stroke="#2F80ED" stroke-width="4" stroke-linecap="round"/>

  <!-- 中心点 -->
  <circle cx="100" cy="100" r="5" class="primary"/>
</svg>
