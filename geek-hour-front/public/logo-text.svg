<svg width="420" height="140" viewBox="0 0 420 140" xmlns="http://www.w3.org/2000/svg">
  <style>
    .primary { fill: #2F80ED; }
    .dark { fill: #0B1F33; }
    .text { font-family: Arial, sans-serif; font-weight: 700; }
  </style>

  <!-- 图标 -->
  <g transform="translate(20,20)">

    <!-- 外框（眼镜形态） -->
    <rect x="0" y="20" width="120" height="70" rx="35" ry="35" class="dark"/>

    <!-- 内部时钟 -->
    <circle cx="60" cy="55" r="30" fill="#ffffff"/>

    <!-- 刻度 -->
    <line x1="60" y1="30" x2="60" y2="35" stroke="#2F80ED" stroke-width="2"/>
    <line x1="60" y1="75" x2="60" y2="80" stroke="#2F80ED" stroke-width="2"/>
    <line x1="35" y1="55" x2="40" y2="55" stroke="#2F80ED" stroke-width="2"/>
    <line x1="80" y1="55" x2="85" y2="55" stroke="#2F80ED" stroke-width="2"/>

    <!-- 时钟指针 -->
    <line x1="60" y1="55" x2="60" y2="38" stroke="#2F80ED" stroke-width="3"/>
    <line x1="60" y1="55" x2="75" y2="65" stroke="#2F80ED" stroke-width="3"/>

  </g>

  <!-- 文字 -->
  <text x="170" y="93" font-size="48" class="text">
    <tspan class="primary">Geek</tspan>
    <tspan class="dark">Hour</tspan>
  </text>

</svg>